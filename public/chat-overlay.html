<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/icon.jpg" type="image/jpeg">
  <title>Chat Overlay</title>
  <style>
    body {
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      overflow: hidden;
    }
    .chat-container {
      width: 420px;
      max-height: 500px;
      overflow-y: auto;
      padding-right: 10px;
    }
    .chat-message {
      display: flex;
      align-items: flex-start;
      margin-bottom: 12px;
      animation: fadeIn 0.4s ease;
      border-radius: 12px;
      padding: 10px 14px;
    }
    body[data-bg="transparent"] .chat-message {
      background: transparent;
    }
    body[data-bg="dim"] .chat-message {
      background: rgba(0, 0, 0, 0.45);
    }
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 12px;
      border: 2px solid #ffd700;
    }
    .message-content {
      flex: 1;
      color: white;
      font-size: 15px;
      line-height: 1.4;
    }
    .username {
      font-weight: bold;
      color: #ffd700;
      margin-right: 8px;
    }
    .comment {
      color: #ffffff;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chat-container::-webkit-scrollbar {
      width: 6px;
    }
    .chat-container::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="chat-container" id="chat"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/overlay-socket.js?v=1.0.3"></script>
  <script>
    document.body.dataset.bg = getOverlayBgId();
    const socket = createOverlaySocket();
    const chatContainer = document.getElementById('chat');
    const MAX_MESSAGES = 8;

    socket.on('chat', (data) => {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'chat-message';

      const avatarHtml = data.avatar 
        ? `<img src="${data.avatar}" class="avatar" alt="" onerror="this.style.display='none'">` 
        : `<div class="avatar" style="background:#555; display:flex; align-items:center; justify-content:center; font-size:16px;">👤</div>`;

      messageDiv.innerHTML = `
        ${avatarHtml}
        <div class="message-content">
          <span class="username">${data.nickname}</span>
          <span class="comment">${data.comment}</span>
        </div>
      `;

      chatContainer.appendChild(messageDiv);

      // จำกัดจำนวนข้อความ
      while (chatContainer.children.length > MAX_MESSAGES) {
        chatContainer.removeChild(chatContainer.firstChild);
      }

      // เลื่อนลงล่างสุด
      chatContainer.scrollTop = chatContainer.scrollHeight;
    });
  </script>
</body>
</html>
