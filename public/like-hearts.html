<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/icon.jpg" type="image/jpeg">
  <title>Like Hearts - Left Side</title>
  <style>
    body {
      background: transparent;
      margin: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    .heart {
      position: absolute;
      pointer-events: none;
      user-select: none;
      animation: floatUp 2.8s ease forwards;
      will-change: transform, opacity;
      z-index: 10;
    }
    .heart img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.28));
    }
    .avatar-heart {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.7);
      pointer-events: none;
      animation: floatUp 3s ease forwards;
      will-change: transform, opacity;
      z-index: 11;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5); opacity: 1; }
      25% { transform: translateY(-80px) scale(1); opacity: 1; }
      100% { transform: translateY(-340px) scale(0.6); opacity: 0; }
    }
  </style>
</head>
<body>
  <script src="/js/hearts-config.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/overlay-socket.js"></script>
  <script>
    const socket = createOverlaySocket();
    const { heartId, sizeId, spreadId } = readLikeHeartsConfigFromUrl();
    const heartImage = getHeartImageOption(heartId).image;
    const heartSizePx = getHeartSizePx(sizeId);

    const MAX_HEARTS = 30;
    const HIGH_LOAD_THRESHOLD = 14;
    const LIKE_INTERVAL_MS = 200;
    const MAX_QUEUE = 8;
    const HEART_BURST_MIN = 2;
    const HEART_BURST_MAX = 4;

    let activeCount = 0;
    const likeQueue = [];
    let drainingQueue = false;

    function createHeart(avatarUrl = null) {
      if (activeCount >= MAX_HEARTS) return false;

      const heart = document.createElement('div');
      const duration = avatarUrl ? 3000 : 2800;
      const pos = randomHeartPosition(spreadId);

      if (avatarUrl) {
        heart.className = 'avatar-heart';
        heart.style.left = pos.left + '%';
        heart.style.bottom = Math.max(pos.bottom, 22) + 'px';
        heart.innerHTML = `<img src="${avatarUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentNode.remove()">`;
      } else {
        heart.className = 'heart';
        heart.style.left = pos.left + '%';
        heart.style.bottom = pos.bottom + 'px';
        heart.style.width = heartSizePx + 'px';
        heart.style.height = heartSizePx + 'px';
        heart.innerHTML = `<img src="${heartImage}" alt="heart">`;
      }

      heart.style.animationDuration = duration + 'ms';
      document.body.appendChild(heart);
      activeCount++;

      setTimeout(() => {
        heart.remove();
        activeCount--;
      }, duration + 50);

      return true;
    }

    function getHeartBurstCount() {
      if (activeCount >= HIGH_LOAD_THRESHOLD) return HEART_BURST_MIN;
      return HEART_BURST_MIN + Math.floor(Math.random() * (HEART_BURST_MAX - HEART_BURST_MIN + 1));
    }

    function spawnLike(data) {
      const busy = activeCount >= HIGH_LOAD_THRESHOLD;
      const burstCount = getHeartBurstCount();

      for (let i = 0; i < burstCount; i++) {
        setTimeout(() => {
          createHeart();
        }, i * (55 + Math.floor(Math.random() * 35)));
      }

      if (data.avatar && !busy && activeCount < MAX_HEARTS) {
        setTimeout(() => createHeart(data.avatar), 120 + burstCount * 70);
      }
    }

    function drainLikeQueue() {
      if (drainingQueue || likeQueue.length === 0) return;
      drainingQueue = true;

      const data = likeQueue.shift();
      spawnLike(data);

      setTimeout(() => {
        drainingQueue = false;
        drainLikeQueue();
      }, LIKE_INTERVAL_MS);
    }

    socket.on('like', (data) => {
      if (likeQueue.length >= MAX_QUEUE) return;
      likeQueue.push(data);
      drainLikeQueue();
    });
  </script>
</body>
</html>
