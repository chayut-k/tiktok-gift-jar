<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/icon.jpg" type="image/jpeg">
  <title>Like Hearts - Left Side</title>
  <style>
    body {
      background: transparent;
      margin: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    .heart {
      position: absolute;
      font-size: 26px;
      pointer-events: none;
      user-select: none;
      animation: floatUp 2.8s ease forwards;
      will-change: transform, opacity;
      z-index: 10;
    }
    .avatar-heart {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.7);
      pointer-events: none;
      animation: floatUp 3s ease forwards;
      will-change: transform, opacity;
      z-index: 11;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5); opacity: 1; }
      25% { transform: translateY(-80px) scale(1); opacity: 1; }
      100% { transform: translateY(-340px) scale(0.6); opacity: 0; }
    }
  </style>
</head>
<body>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/overlay-socket.js"></script>
  <script>
    const socket = createOverlaySocket();
    const colors = ['#ff69b4', '#ff1493', '#c71585', '#da70d6', '#ba55d3', '#ff00ff'];

    const MAX_HEARTS = 18;
    const HIGH_LOAD_THRESHOLD = 10;
    const LIKE_INTERVAL_MS = 200;
    const MAX_QUEUE = 8;

    let activeCount = 0;
    const likeQueue = [];
    let drainingQueue = false;

    function createHeart(avatarUrl = null) {
      if (activeCount >= MAX_HEARTS) return false;

      const heart = document.createElement('div');
      const duration = avatarUrl ? 3000 : 2800;
      const leftPos = 5 + Math.random() * 27;

      if (avatarUrl) {
        heart.className = 'avatar-heart';
        heart.style.left = leftPos + '%';
        heart.style.bottom = '25px';
        heart.innerHTML = `<img src="${avatarUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentNode.remove()">`;
      } else {
        heart.className = 'heart';
        heart.style.left = leftPos + '%';
        heart.style.bottom = '20px';
        heart.style.color = colors[Math.floor(Math.random() * colors.length)];
        heart.innerHTML = '❤️';
      }

      heart.style.animationDuration = duration + 'ms';
      document.body.appendChild(heart);
      activeCount++;

      setTimeout(() => {
        heart.remove();
        activeCount--;
      }, duration + 50);

      return true;
    }

    function spawnLike(data) {
      const busy = activeCount >= HIGH_LOAD_THRESHOLD;
      if (!createHeart()) return;

      if (data.avatar && !busy && activeCount < MAX_HEARTS) {
        setTimeout(() => createHeart(data.avatar), 150);
      }
    }

    function drainLikeQueue() {
      if (drainingQueue || likeQueue.length === 0) return;
      drainingQueue = true;

      const data = likeQueue.shift();
      spawnLike(data);

      setTimeout(() => {
        drainingQueue = false;
        drainLikeQueue();
      }, LIKE_INTERVAL_MS);
    }

    socket.on('like', (data) => {
      if (likeQueue.length >= MAX_QUEUE) return;
      likeQueue.push(data);
      drainLikeQueue();
    });
  </script>
</body>
</html>
