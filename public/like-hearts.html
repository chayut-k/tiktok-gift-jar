<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/icon.jpg" type="image/jpeg">
  <title>Like Hearts - Left Side</title>
  <style>
    body {
      background: transparent;
      margin: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    .heart {
      position: absolute;
      font-size: 26px;
      pointer-events: none;
      user-select: none;
      animation: floatUp 5s ease forwards;
      z-index: 10;
    }
    .avatar-heart {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.7);
      pointer-events: none;
      animation: floatUp 5.2s ease forwards;
      z-index: 11;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5); opacity: 1; }
      25% { transform: translateY(-100px) scale(1); opacity: 1; }
      100% { transform: translateY(-420px) scale(0.6); opacity: 0; }
    }
  </style>
</head>
<body>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/overlay-socket.js"></script>
  <script>
    const socket = createOverlaySocket();
    const colors = ['#ff69b4', '#ff1493', '#c71585', '#da70d6', '#ba55d3', '#ff00ff'];

    function createHeart(avatarUrl = null) {
      const heart = document.createElement('div');

      // กำหนดตำแหน่งด้านซ้าย (5% - 32%)
      const leftPos = 5 + Math.random() * 27;

      if (avatarUrl) {
        heart.className = 'avatar-heart';
        heart.style.left = leftPos + '%';
        heart.style.bottom = '25px';
        heart.innerHTML = `<img src="${avatarUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentNode.removeChild(this);">`;
      } else {
        heart.className = 'heart';
        heart.style.left = leftPos + '%';
        heart.style.bottom = '20px';
        heart.style.color = colors[Math.floor(Math.random() * colors.length)];
        heart.innerHTML = '❤️';
      }

      document.body.appendChild(heart);

      setTimeout(() => {
        if (heart.parentNode) heart.parentNode.removeChild(heart);
      }, 5500);
    }

    // หัวใจพื้นหลังลอยช้า ๆ (แค่ 2-3 จุด)
    setInterval(() => {
      if (Math.random() > 0.65) {
        createHeart();
      }
    }, 650);

    // รับ event จาก server
    socket.on('like', (data) => {
      // สร้างหัวใจธรรมดา
      createHeart();

      // ถ้ามี avatar ให้สร้างเพิ่ม
      if (data.avatar) {
        setTimeout(() => {
          createHeart(data.avatar);
        }, 220);
      }
    });
  </script>
</body>
</html>
