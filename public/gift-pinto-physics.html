<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/icon.jpg" type="image/jpeg">
  <title>Gift Pinto Physics</title>
  <script src="/js/pinto-config.js"></script>
  <script src="/js/gift-size.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      background: transparent;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    body.preview-mode .stage { margin: 0; }
    body.preview-mode .below-stage { display: none; }
    .stage {
      position: relative;
      width: 460px;
      height: 620px;
      margin: 20px auto;
    }
    .pinto-clip {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
    }
    .pinto-img {
      position: absolute;
      bottom: 0;
      object-fit: fill;
      pointer-events: none;
    }
    .physics-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }
    .tier-badge {
      position: absolute;
      top: 8px;
      right: 10px;
      background: rgba(0, 0, 0, 0.72);
      color: #ffd700;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 14px;
      z-index: 12;
      pointer-events: none;
    }
    .coin-counter {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 4px 16px;
      border-radius: 22px;
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 10;
      pointer-events: none;
    }
    .coin-counter img {
      width: 30px;
      height: 30px;
    }
    body[data-coins="hide"] .coin-counter {
      display: none;
    }
    .label {
      text-align: center;
      color: #ffd700;
      font-size: 23px;
      margin-top: 15px;
      text-shadow: 0 3px 12px #000;
      font-weight: bold;
    }
    .test-hint {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="pinto-clip" id="pinto-clip">
      <img class="pinto-img" id="pinto-img" src="/images/ปิ่นโต2.png" alt="ปิ่นโต">
    </div>
    <div class="physics-layer" id="physics-layer"></div>
    <div class="tier-badge" id="tier-badge">ชั้น 1 / 4</div>
    <div class="coin-counter" id="coin-counter">
      <img src="/images/coin.png" alt="coin">
      <span id="total">0</span>
    </div>
  </div>
  <div class="below-stage">
    <div class="label" id="last-gift">รอของขวัญ...</div>
    <div class="test-hint" id="test-hint">G=1เหรียญ H=20เหรียญ J=100เหรียญ | R=รีเซ็ต</div>
  </div>

  <script src="/js/matter.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/overlay-socket.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const isPreview = params.get('preview') === '1';
    const showTierGuides = isPreview || params.get('debug') === '1';
    const selectedPintoId = getPintoVariantFromUrl();
    document.body.dataset.coins = getOverlayCoinsDisplay();
    const { pintoConfig } = applyPintoImage('pinto-img', selectedPintoId);
    const PINTO = pintoConfig;
    const TIERS = PINTO.tiers;
    const TEST_GIFT_SIZES = { g: 1, h: 20, j: 100 };

    function applyPintoLayoutStyles() {
      const img = document.getElementById('pinto-img');
      const layout = PINTO.layout;
      img.style.left = `${layout.offsetX}px`;
      img.style.bottom = '0';
      img.style.top = 'auto';
      img.style.width = `${layout.displayW}px`;
      img.style.height = `${layout.displayH}px`;
    }

    if (isPreview) {
      document.body.classList.add('preview-mode');
    }
    applyPintoLayoutStyles();

    const STAGE_W = 460;
    const STAGE_H = 620;
    const FALLBACK_TEXTURE = '/images/rose.png';
    const FALLEN_Y = STAGE_H + 120;
    const SPILL_FLOOR_Y = PINTO.spillFloorY;
    const SETTLE_IDLE_MS_SPILL = 9000;
    const SETTLE_SPEED_SPILL = 0.026;
    const PINTO_GIFT_SCALE = 0.875;

    let total = 0;
    let giftCount = 0;
    let visibleTiers = 1;
    let lidClosedMode = false;
    const tierUnlockAt = [false, false, false, false];
    let structureBodies = [];
    const imageCache = new Map();
    const MAX_DYNAMIC_GIFTS = 35;
    const GIFT_LABELS = ['gift', 'gift-static'];

    function initPhysics() {
      if (typeof Matter === 'undefined') {
        console.error('Matter.js โหลดไม่สำเร็จ');
        return;
      }

      const {
        Engine, Render, Runner, World, Bodies, Body, Composite, Events
      } = Matter;

      const engine = Engine.create({
        enableSleeping: true,
        positionIterations: 12,
        velocityIterations: 10
      });
      engine.gravity.y = 1.15;

      const render = Render.create({
        element: document.getElementById('physics-layer'),
        engine,
        options: {
          width: STAGE_W,
          height: STAGE_H,
          wireframes: false,
          background: 'transparent',
          pixelRatio: Math.min(window.devicePixelRatio || 1, 2)
        }
      });

      function wall(x, y, w, h, label, angle = 0) {
        const body = Bodies.rectangle(x, y, w, h, {
          isStatic: true,
          angle,
          friction: 0.55,
          restitution: 0.02,
          render: { visible: false }
        });
        body.label = label;
        body.friction = 0.28;
        return body;
      }

      function getActiveTopTier() {
        return TIERS[visibleTiers - 1];
      }

      function updatePintoVisual() {
        const tier = getActiveTopTier();
        const clip = document.getElementById('pinto-clip');
        const badge = document.getElementById('tier-badge');
        let revealTop;
        if (lidClosedMode) {
          revealTop = Math.max(0, Math.round(PINTO.fullRevealTopY));
        } else if (visibleTiers >= PINTO.tierCount) {
          revealTop = Math.max(0, Math.round(tier.revealTopY));
        } else {
          revealTop = Math.max(0, Math.round(tier.revealTopY));
        }
        clip.style.clipPath = `inset(${revealTop}px 0 0 0)`;
        clip.style.webkitClipPath = `inset(${revealTop}px 0 0 0)`;
        badge.textContent = lidClosedMode
          ? `ปิดฝาแล้ว · กองบนฝา/พื้นได้`
          : `ชั้น ${visibleTiers} / ${PINTO.tierCount}`;
      }

      function clearStructureBodies() {
        if (!structureBodies.length) return;
        World.remove(engine.world, structureBodies);
        structureBodies = [];
      }

      function buildTierWalls(tier) {
        return [
          wall(PINTO.centerX, tier.floorY, tier.floorWidth, 10, 'pinto-wall'),
          wall(tier.innerLeft + 2, tier.wallCenterY, 10, tier.wallHeight, 'pinto-wall'),
          wall(tier.innerRight - 2, tier.wallCenterY, 10, tier.wallHeight, 'pinto-wall')
        ];
      }

      function buildLidPlatform() {
        const lidY = PINTO.lidBottomY + 2;
        const lidWidth = PINTO.lidRightX - PINTO.lidLeftX;
        return wall(PINTO.centerX, lidY, lidWidth, 10, 'pinto-lid');
      }

      function buildSpillSurfaces() {
        const spillFloor = wall(STAGE_W / 2, SPILL_FLOOR_Y, STAGE_W, 14, 'pinto-spill');
        const boundHeight = 300;
        const boundCenterY = SPILL_FLOOR_Y - boundHeight / 2 + 6;
        const leftBound = wall(10, boundCenterY, 12, boundHeight, 'pinto-spill');
        const rightBound = wall(STAGE_W - 10, boundCenterY, 12, boundHeight, 'pinto-spill');
        return [spillFloor, leftBound, rightBound];
      }

      function rebuildStructure() {
        clearStructureBodies();
        const walls = [];

        for (let i = 0; i < visibleTiers; i++) {
          walls.push(...buildTierWalls(TIERS[i]));
        }

        if (lidClosedMode) {
          walls.push(buildLidPlatform(), ...buildSpillSurfaces());
        } else {
          const topTier = getActiveTopTier();
          walls.push(
            wall(
              PINTO.centerX,
              topTier.topY + 5,
              topTier.floorWidth - 4,
              6,
              'pinto-ceiling'
            )
          );
        }

        structureBodies = walls;
        World.add(engine.world, walls);
        updatePintoVisual();
      }

      function freezeGiftsInTier(tierIndex) {
        giftsInTier(tierIndex).forEach((body) => {
          freezeGift(body, true);
        });
      }

      function getGiftBodies() {
        return Composite.allBodies(engine.world).filter((b) => GIFT_LABELS.includes(b.label));
      }

      function giftsInTier(tierIndex) {
        const tier = TIERS[tierIndex];
        return getGiftBodies().filter((body) => {
          const y = body.position.y;
          const r = body.circleRadius || 12;
          const inX = body.position.x >= tier.innerLeft - r && body.position.x <= tier.innerRight + r;
          return inX && y + r >= tier.topY - 4 && y - r <= tier.floorY + 6;
        });
      }

      function getGiftTop(body) {
        return body.position.y - (body.circleRadius || 12);
      }

      function getTierPileTop(tierIndex) {
        const gifts = giftsInTier(tierIndex);
        if (!gifts.length) return Infinity;
        return Math.min(...gifts.map(getGiftTop));
      }

      function getGiftsAtRim(tierIndex) {
        const tier = TIERS[tierIndex];
        const rimY = tier.topY + 10;
        return giftsInTier(tierIndex).filter((body) => getGiftTop(body) <= rimY);
      }

      function isTierSpilling(tierIndex) {
        if (tierUnlockAt[tierIndex]) return false;

        const tier = TIERS[tierIndex];
        const gifts = giftsInTier(tierIndex);
        const minGifts = tierIndex === 0 ? 5 : 3;
        if (gifts.length < minGifts) return false;

        const pileTop = getTierPileTop(tierIndex);
        const rimGifts = getGiftsAtRim(tierIndex);
        const interior = tier.floorY - tier.topY;
        const fillDepth = Number.isFinite(pileTop) ? tier.floorY - pileTop : 0;
        const fillRatio = fillDepth / interior;
        const targetFill = tier.fillRatio || 0.9;
        const ceilingBottom = tier.topY + 7;
        const pileAtRim = pileTop <= ceilingBottom && fillRatio >= targetFill - 0.06;
        const spillOverRim = rimGifts.length >= 2 && fillRatio >= targetFill - 0.12;

        return pileAtRim || spillOverRim;
      }

      function unlockNextTier() {
        if (visibleTiers >= PINTO.tierCount) return;
        const filledTierIndex = visibleTiers - 1;
        tierUnlockAt[filledTierIndex] = true;
        freezeGiftsInTier(filledTierIndex);
        visibleTiers += 1;
        rebuildStructure();
      }

      function enableLidClosed() {
        if (lidClosedMode || visibleTiers < PINTO.tierCount) return;
        const topTierIndex = PINTO.tierCount - 1;
        tierUnlockAt[topTierIndex] = true;
        freezeGiftsInTier(topTierIndex);
        lidClosedMode = true;
        rebuildStructure();
      }

      function isSpillGift(body) {
        if (!lidClosedMode) return false;
        const radius = body.circleRadius || 12;
        return body.position.y + radius >= SPILL_FLOOR_Y - 14;
      }

      function isOnLidGift(body) {
        if (!lidClosedMode) return false;
        const radius = body.circleRadius || 12;
        const y = body.position.y;
        return y + radius >= PINTO.lidBottomY - 6 && y - radius <= PINTO.lidTopY + 36;
      }

      function checkTierProgression() {
        if (visibleTiers < PINTO.tierCount) {
          const tierIndex = visibleTiers - 1;
          if (isTierSpilling(tierIndex)) {
            unlockNextTier();
          }
          return;
        }

        if (!lidClosedMode && isTierSpilling(PINTO.tierCount - 1)) {
          enableLidClosed();
        }
      }

      function getGiftTierIndex(body) {
        if (lidClosedMode && (isOnLidGift(body) || isSpillGift(body))) return -1;

        const y = body.position.y;
        const r = body.circleRadius || 12;
        for (let i = TIERS.length - 1; i >= 0; i--) {
          const tier = TIERS[i];
          if (y + r >= tier.topY - 2 && y - r <= tier.floorY + 4) {
            return i;
          }
        }
        return -1;
      }

      function isGiftInLockedTier(body) {
        const tierIndex = getGiftTierIndex(body);
        return tierIndex >= 0 && tierUnlockAt[tierIndex] === true;
      }

      function drawTierGuides(ctx) {
        const guideColor = '#0b5d1e';
        const rimColor = '#0d7a28';
        const floorColor = '#085018';
        const lidColor = '#c62828';

        ctx.save();
        ctx.globalAlpha = lidClosedMode ? 0.9 : 0.45;
        ctx.strokeStyle = lidColor;
        ctx.lineWidth = 3;
        ctx.strokeRect(
          PINTO.lidLeftX,
          PINTO.lidTopY,
          PINTO.lidRightX - PINTO.lidLeftX,
          PINTO.lidBottomY - PINTO.lidTopY
        );
        if (lidClosedMode) {
          ctx.strokeStyle = '#1565c0';
          ctx.setLineDash([6, 4]);
          ctx.strokeRect(8, SPILL_FLOOR_Y - 10, STAGE_W - 16, 8);
          ctx.setLineDash([]);
        }
        ctx.restore();

        for (let i = 0; i < TIERS.length; i++) {
          const tier = TIERS[i];
          const left = tier.innerLeft;
          const right = tier.innerRight;
          const width = right - left;
          const height = tier.floorY - tier.topY;

          ctx.save();
          ctx.globalAlpha = i < visibleTiers ? 0.78 : 0.22;
          ctx.strokeStyle = guideColor;
          ctx.lineWidth = 2;
          ctx.strokeRect(left, tier.topY, width, height);

          ctx.strokeStyle = rimColor;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(left, tier.topY);
          ctx.lineTo(right, tier.topY);
          ctx.stroke();

          ctx.strokeStyle = floorColor;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(left, tier.floorY);
          ctx.lineTo(right, tier.floorY);
          ctx.stroke();
          ctx.restore();
        }
      }

      function getActiveTierMinY() {
        const tier = getActiveTopTier();
        return tier.topY + 24;
      }

      function canSettleGift(body) {
        if (!body) return false;
        if (lidClosedMode) return isSpillGift(body);
        return false;
      }

      function freezeGift(body, force = false) {
        if (!body || body.isStatic || body.frozen) return;
        if (!force && !canSettleGift(body)) return;
        Body.setStatic(body, true);
        Body.setVelocity(body, { x: 0, y: 0 });
        Body.setAngularVelocity(body, 0);
        body.label = 'gift-static';
        body.frozen = true;
      }

      function enforceDynamicLimit() {
        const dynamic = getGiftBodies().filter((b) => b.label === 'gift');
        if (dynamic.length <= MAX_DYNAMIC_GIFTS) return;

        let excess = dynamic.length - MAX_DYNAMIC_GIFTS;
        const settled = dynamic
          .filter((body) => isSpillGift(body) || isGiftInLockedTier(body))
          .sort((a, b) => b.position.y - a.position.y);

        for (let i = 0; i < settled.length && excess > 0; i++) {
          freezeGift(settled[i]);
          excess--;
        }

        if (excess <= 0) return;

        dynamic
          .filter((b) => b.label === 'gift' && b.position.y < getActiveTierMinY())
          .sort((a, b) => a.position.y - b.position.y)
          .slice(0, excess)
          .forEach((body) => {
            Body.setVelocity(body, {
              x: (Math.random() - 0.5) * 1.6,
              y: 4.2 + Math.random() * 2
            });
            body.lastNudgeTime = Date.now();
          });
      }

      function loadGiftImage(url) {
        const src = url || FALLBACK_TEXTURE;
        if (imageCache.has(src)) return imageCache.get(src);

        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = src;
        imageCache.set(src, img);

        img.onerror = () => {
          if (src !== FALLBACK_TEXTURE) {
            imageCache.set(src, loadGiftImage(FALLBACK_TEXTURE));
          }
        };

        return img;
      }

      function getGiftSpawnPoint(topTier, radius) {
        const pad = 6;
        const innerLeft = topTier.innerLeft + radius + pad;
        const innerRight = topTier.innerRight - radius - pad;
        const rimGap = 20;
        const innerTop = topTier.topY + rimGap + radius;
        const innerBottom = topTier.floorY - radius - pad;
        const yLow = innerTop;
        const yHigh = innerBottom;
        const xSpan = Math.max(14, (innerRight - innerLeft) * 0.68);

        return {
          x: Math.max(
            innerLeft,
            Math.min(innerRight, PINTO.centerX + (Math.random() - 0.5) * xSpan * 2)
          ),
          y: yLow + Math.random() * Math.max(12, yHigh - yLow)
        };
      }

      function getLidSpawnPoint(radius) {
        const pad = 6;
        const innerLeft = PINTO.lidLeftX + radius + pad;
        const innerRight = PINTO.lidRightX - radius - pad;
        const xSpread = Math.min(34, Math.max(14, radius * 1.6));
        const dropFrom = PINTO.lidTopY - radius - 18;
        const dropTo = PINTO.lidBottomY - radius - 56;

        return {
          x: Math.max(
            innerLeft,
            Math.min(innerRight, PINTO.centerX + (Math.random() - 0.5) * xSpread)
          ),
          y: dropFrom - Math.random() * Math.max(48, dropFrom - dropTo)
        };
      }

      function createGift(data) {
        const diamonds = Number(data.diamonds) || 1;
        const radius = giftPhysicsRadius(diamonds) * PINTO_GIFT_SCALE;
        const spawn = lidClosedMode
          ? getLidSpawnPoint(radius)
          : getGiftSpawnPoint(getActiveTopTier(), radius);
        const bounce = lidClosedMode ? 0.42 : 0.52;

        const gift = Bodies.circle(spawn.x, spawn.y, radius, {
          restitution: bounce,
          friction: 0.14,
          frictionStatic: 0.22,
          frictionAir: 0.012,
          density: 0.00075 * (14 / radius),
          slop: 0.015,
          render: {
            fillStyle: 'transparent',
            strokeStyle: 'transparent',
            lineWidth: 0
          }
        });

        gift.label = 'gift';
        gift.giftImage = loadGiftImage(data.giftPictureUrl);
        gift.spawnTime = Date.now();
        gift.lastMoveTime = gift.spawnTime;
        gift.sleepThreshold = Infinity;

        World.add(engine.world, gift);
        Body.setAngularVelocity(gift, (Math.random() - 0.5) * 0.22);
        Body.setVelocity(gift, {
          x: (Math.random() - 0.5) * (lidClosedMode ? 0.35 : 0.9),
          y: lidClosedMode ? 2.4 + Math.random() * 1.8 : 1.8 + Math.random() * 1.2
        });

        giftCount++;
        enforceDynamicLimit();
      }

      function removeFallenGifts() {
        const gifts = getGiftBodies();
        const fallen = gifts.filter((b) => b.position.y > FALLEN_Y);
        if (fallen.length) World.remove(engine.world, fallen);
      }

      function trackGiftMotion() {
        const now = Date.now();
        getGiftBodies().forEach((body) => {
          if (body.label !== 'gift' || body.isStatic) return;
          if (body.speed >= 0.18) {
            body.lastMoveTime = now;
          }
        });
      }

      function settleIdleGifts() {
        if (!lidClosedMode) return;

        const now = Date.now();
        getGiftBodies().forEach((body) => {
          if (body.label !== 'gift' || body.isStatic) return;
          if (!isSpillGift(body)) return;

          const idleFor = now - (body.lastMoveTime || body.spawnTime || 0);
          if (body.speed < SETTLE_SPEED_SPILL && idleFor > SETTLE_IDLE_MS_SPILL) {
            freezeGift(body, true);
          }
        });
      }

      function relieveStuckGifts() {
        if (lidClosedMode || visibleTiers >= 3) return;

        const now = Date.now();
        const topTier = getActiveTopTier();
        const neckY = topTier.mouthY - 18;

        getGiftBodies().forEach((body) => {
          if (body.isStatic || body.label !== 'gift' || isGiftInLockedTier(body)) return;
          if (body.position.y < topTier.topY - 6) return;
          if (body.position.y > topTier.floorY + 12) return;

          const lastNudge = body.lastNudgeTime || body.spawnTime || 0;
          const stuckFor = now - lastNudge;
          if (body.speed < 0.28 && stuckFor > (body.position.y >= neckY ? 500 : 900)) {
            Body.setVelocity(body, {
              x: (Math.random() - 0.5) * 1.1,
              y: Math.max(body.velocity.y, 2.8 + Math.random() * 1.4)
            });
            Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.35);
            body.lastNudgeTime = now;
          } else if (body.speed >= 0.35) {
            body.lastMoveTime = now;
            body.lastNudgeTime = now;
          }
        });
      }

      function resetPinto() {
        const gifts = getGiftBodies();
        World.remove(engine.world, gifts);
        giftCount = 0;
        visibleTiers = 1;
        lidClosedMode = false;
        tierUnlockAt.fill(false);
        rebuildStructure();
      }

      function updateRenderQuality() {
        const count = getGiftBodies().length;
        render.options.pixelRatio = count > 45
          ? 1
          : Math.min(window.devicePixelRatio || 1, 2);
      }

      Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        const gifts = getGiftBodies();

        if (showTierGuides) {
          drawTierGuides(ctx);
        }

        for (const body of gifts) {
          const img = body.giftImage;
          const r = body.circleRadius;
          const pos = body.position;
          const angle = body.isStatic ? 0 : body.angle;

          ctx.save();
          ctx.translate(pos.x, pos.y);
          if (!body.isStatic) ctx.rotate(angle);

          if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, -r, -r, r * 2, r * 2);
          } else {
            ctx.fillStyle = '#ff4d8d';
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.restore();
        }

        updateRenderQuality();
      });

      Events.on(engine, 'sleepStart', (event) => {
        if (!event.body || event.body.label !== 'gift') return;
        if (lidClosedMode && isSpillGift(event.body)) {
          freezeGift(event.body, true);
        }
      });

      Events.on(engine, 'beforeUpdate', () => {
        removeFallenGifts();
        relieveStuckGifts();
        trackGiftMotion();
        settleIdleGifts();
        checkTierProgression();
      });

      if (!isPreview) {
        const socket = createOverlaySocket();
        socket.on('gift', (data) => {
          if (!data.user) return;

          total = data.total || total;
          document.getElementById('total').textContent = total.toLocaleString('th-TH');
          document.getElementById('last-gift').textContent =
            `${data.user} ส่ง ${data.giftName}`;

          const repeatCount = Number(data.repeatCount) || 0;
          if (repeatCount <= 0) return;

          const count = Math.min(repeatCount, 5);
          for (let i = 0; i < count; i++) {
            setTimeout(() => createGift(data), i * 180);
          }
        });
      }

      function spawnTestGift(diamonds) {
        createGift({
          giftPictureUrl: FALLBACK_TEXTURE,
          diamonds
        });
      }

      document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'g') spawnTestGift(TEST_GIFT_SIZES.g);
        if (key === 'h') spawnTestGift(TEST_GIFT_SIZES.h);
        if (key === 'j') spawnTestGift(TEST_GIFT_SIZES.j);
        if (key === 'r') resetPinto();
      });

      if (isPreview) {
        let previewCount = 0;
        const previewSizes = [1, 20, 100];
        const previewTimer = setInterval(() => {
          spawnTestGift(previewSizes[previewCount % previewSizes.length]);
          previewCount++;
          if (previewCount >= 36) clearInterval(previewTimer);
        }, 800);
      }

      rebuildStructure();
      Render.run(render);
      Runner.run(Runner.create(), engine);
    }

    initPhysics();
  </script>
</body>
</html>
