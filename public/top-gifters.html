<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/icon.jpg" type="image/jpeg">
  <title>Top Gifters</title>
  <style>
    body {
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 12px;
      color: white;
      width: 380px;
    }
    .gifter {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      padding: 9px 14px;
      border-radius: 12px;
    }
    body[data-bg="transparent"] .gifter {
      background: transparent;
    }
    body[data-bg="dim"] .gifter {
      background: rgba(0, 0, 0, 0.45);
    }
    .rank-container {
      width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
    }
    .medal {
      font-size: 26px;
    }
    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid #ffd700;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .info {
      flex: 1;
      min-width: 0;
    }
    .nickname {
      font-size: 17px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .diamonds {
      font-size: 15px;
      color: #ffd700;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .coin-icon {
      width: 20px;
      height: 20px;
      object-fit: contain;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/overlay-socket.js?v=1.0.8"></script>
  <script>
    document.body.dataset.bg = getOverlayBgId();
    const socket = createOverlaySocket();
    const container = document.getElementById('container');

    function getMedal(rank) {
      if (rank === 1) return `<span class="medal">🥇</span>`;
      if (rank === 2) return `<span class="medal">🥈</span>`;
      if (rank === 3) return `<span class="medal">🥉</span>`;
      return `<span style="color:#ccc; font-size:17px;">${rank}.</span>`;
    }

    socket.on('topGifters', (gifters) => {
      container.innerHTML = '';

      gifters.forEach((gifter) => {
        const div = document.createElement('div');
        div.className = 'gifter';

        const safeAvatar = sanitizeImageUrl(gifter.avatar);
        const avatarHtml = safeAvatar
          ? `<img src="${safeAvatar}" class="avatar" onerror="this.style.display='none'">`
          : `<div class="avatar" style="background:#555; display:flex; align-items:center; justify-content:center; font-size:20px; color:#aaa;">👤</div>`;

        div.innerHTML = `
          <div class="rank-container">
            ${getMedal(gifter.rank)}
          </div>
          ${avatarHtml}
          <div class="info">
            <div class="nickname">${escapeHtml(gifter.nickname || gifter.username)}</div>
            <div class="diamonds">
              <img src="images/coin.png" class="coin-icon" alt="">
              ${gifter.diamonds.toLocaleString()}
            </div>
          </div>
        `;

        container.appendChild(div);
      });
    });
  </script>
</body>
</html>
