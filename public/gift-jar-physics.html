<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/icon.jpg" type="image/jpeg">
  <title>Gift Jar Physics</title>
  <script src="/js/jar-config.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      background: transparent;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    body.preview-mode .stage { margin: 0; }
    body.preview-mode .below-stage { display: none; }
    .stage {
      position: relative;
      width: 460px;
      height: 620px;
      margin: 20px auto;
    }
    .jar-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
      filter: drop-shadow(0 25px 35px rgba(0, 0, 0, 0.6));
    }
    .physics-layer {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }
    .coin-counter {
      position: absolute;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 4px 16px;
      border-radius: 22px;
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 10;
      pointer-events: none;
    }
    .coin-counter img {
      width: 30px;
      height: 30px;
    }
    .label {
      text-align: center;
      color: #ffd700;
      font-size: 23px;
      margin-top: 15px;
      text-shadow: 0 3px 12px #000;
      font-weight: bold;
    }
    .test-hint {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <img class="jar-img" id="jar-img" src="/images/jar1.png" alt="โถแก้ว">
    <div class="physics-layer" id="physics-layer"></div>
    <div class="coin-counter">
      <img src="/images/coin.png" alt="coin">
      <span id="total">0</span>
    </div>
  </div>
  <div class="below-stage">
    <div class="label" id="last-gift">รอของขวัญ...</div>
    <div class="test-hint" id="test-hint">กด G เพื่อทดสอบของขวัญ | กด R เพื่อรีเซ็ตโถ</div>
  </div>

  <script src="/js/matter.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/overlay-socket.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const isPreview = params.get('preview') === '1';
    const { jarId, jarConfig } = applyJarImage('jar-img');
    const JAR = jarConfig.physics;

    if (isPreview) {
      document.body.classList.add('preview-mode');
    }

    const STAGE_W = 460;
    const STAGE_H = 620;
    const FALLBACK_TEXTURE = '/images/rose.png';
    const FALLEN_Y = STAGE_H + 120;

    let total = 0;
    let giftCount = 0;
    const imageCache = new Map();

    function initPhysics() {
      if (typeof Matter === 'undefined') {
        console.error('Matter.js โหลดไม่สำเร็จ');
        return;
      }

      const {
        Engine, Render, Runner, World, Bodies, Body, Composite, Events
      } = Matter;

      const engine = Engine.create({
        enableSleeping: true,
        positionIterations: 8,
        velocityIterations: 6
      });
      engine.gravity.y = 1.15;

      const render = Render.create({
        element: document.getElementById('physics-layer'),
        engine,
        options: {
          width: STAGE_W,
          height: STAGE_H,
          wireframes: false,
          background: 'transparent',
          pixelRatio: Math.min(window.devicePixelRatio || 1, 2)
        }
      });

      function wall(x, y, w, h, angle = 0) {
        return Bodies.rectangle(x, y, w, h, {
          isStatic: true,
          angle,
          friction: 0.9,
          restitution: 0.05,
          render: { visible: false }
        });
      }

      function buildJarWalls() {
        const floor = wall(JAR.centerX, JAR.floorY, JAR.floorWidth, 18);
        const left = wall(JAR.innerLeft, JAR.wallCenterY, 16, JAR.wallHeight);
        const right = wall(JAR.innerRight, JAR.wallCenterY, 16, JAR.wallHeight);
        const neckLeft = wall(
          JAR.innerLeft + JAR.neckInset + 4,
          JAR.wallTopY + 42,
          12, 58, -0.28
        );
        const neckRight = wall(
          JAR.innerRight - JAR.neckInset - 4,
          JAR.wallTopY + 42,
          12, 58, 0.28
        );
        const rimLeft = wall(JAR.innerLeft - 2, JAR.wallTopY + 8, 46, 10, -0.55);
        const rimRight = wall(JAR.innerRight + 2, JAR.wallTopY + 8, 46, 10, 0.55);
        return [floor, left, right, neckLeft, neckRight, rimLeft, rimRight];
      }

      function buildSpillSurfaces() {
        const spillY = JAR.floorY + 16;
        const spillFloor = wall(STAGE_W / 2, spillY, STAGE_W, 14);
        const boundHeight = 240;
        const boundCenterY = spillY - boundHeight / 2 + 8;
        const leftBound = wall(14, boundCenterY, 12, boundHeight);
        const rightBound = wall(STAGE_W - 14, boundCenterY, 12, boundHeight);
        return [spillFloor, leftBound, rightBound];
      }

      World.add(engine.world, [...buildJarWalls(), ...buildSpillSurfaces()]);

      function giftRadius(diamonds) {
        const scale = diamonds >= 1000 ? 2.55 :
          diamonds >= 500 ? 2.2 :
          diamonds >= 100 ? 1.85 :
          Math.min(2.1, 0.85 + (diamonds / 55));
        return Math.max(11, Math.min(26, Math.floor(15.5 * scale) / 2));
      }

      function loadGiftImage(url) {
        const src = url || FALLBACK_TEXTURE;
        if (imageCache.has(src)) return imageCache.get(src);

        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = src;
        imageCache.set(src, img);

        img.onerror = () => {
          if (src !== FALLBACK_TEXTURE) {
            imageCache.set(src, loadGiftImage(FALLBACK_TEXTURE));
          }
        };

        return img;
      }

      function createGift(data) {
        const diamonds = data.diamonds || 1;
        const radius = giftRadius(diamonds);
        const x = JAR.centerX + (Math.random() - 0.5) * JAR.mouthHalfWidth * 2;
        const y = JAR.mouthY - Math.random() * 18;

        const gift = Bodies.circle(x, y, radius, {
          restitution: 0.35,
          friction: 0.65,
          frictionAir: 0.012,
          density: 0.0012,
          slop: 0.02,
          render: {
            fillStyle: 'transparent',
            strokeStyle: 'transparent',
            lineWidth: 0
          }
        });

        gift.label = 'gift';
        gift.giftImage = loadGiftImage(data.giftPictureUrl);
        gift.spawnTime = Date.now();

        World.add(engine.world, gift);
        Body.setAngularVelocity(gift, (Math.random() - 0.5) * 0.25);
        Body.setVelocity(gift, {
          x: (Math.random() - 0.5) * 1.2,
          y: Math.random() * 0.8
        });

        giftCount++;
      }

      function removeFallenGifts() {
        const gifts = Composite.allBodies(engine.world).filter(b => b.label === 'gift');
        const fallen = gifts.filter(b => b.position.y > FALLEN_Y);
        if (fallen.length) World.remove(engine.world, fallen);
      }

      function resetJar() {
        const gifts = Composite.allBodies(engine.world).filter(b => b.label === 'gift');
        World.remove(engine.world, gifts);
        giftCount = 0;
      }

      Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        const gifts = Composite.allBodies(engine.world).filter(b => b.label === 'gift');

        for (const body of gifts) {
          const img = body.giftImage;
          const r = body.circleRadius;
          const pos = body.position;
          const angle = body.angle;

          ctx.save();
          ctx.translate(pos.x, pos.y);
          ctx.rotate(angle);

          if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, -r, -r, r * 2, r * 2);
          } else {
            ctx.fillStyle = '#ff4d8d';
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.restore();
        }
      });

      Events.on(engine, 'beforeUpdate', () => {
        removeFallenGifts();
      });

      if (!isPreview) {
        const socket = createOverlaySocket();
        socket.on('gift', (data) => {
          if (!data.user) return;

          total = data.total || total;
          document.getElementById('total').textContent = total.toLocaleString('th-TH');
          document.getElementById('last-gift').textContent =
            `${data.user} ส่ง ${data.giftName}`;

          const count = Math.min(data.repeatCount || 1, 5);
          for (let i = 0; i < count; i++) {
            setTimeout(() => createGift(data), i * 180);
          }
        });
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'g' || e.key === 'G') {
          createGift({
            giftPictureUrl: FALLBACK_TEXTURE,
            diamonds: 50 + Math.floor(Math.random() * 400)
          });
        }
        if (e.key === 'r' || e.key === 'R') {
          resetJar();
        }
      });

      if (isPreview) {
        let previewCount = 0;
        const previewTimer = setInterval(() => {
          createGift({
            giftPictureUrl: FALLBACK_TEXTURE,
            diamonds: 80 + Math.floor(Math.random() * 300)
          });
          previewCount++;
          if (previewCount >= 8) clearInterval(previewTimer);
        }, 900);
      }

      Render.run(render);
      Runner.run(Runner.create(), engine);
    }

    initPhysics();
  </script>
</body>
</html>
