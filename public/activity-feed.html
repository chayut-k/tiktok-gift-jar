<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/icon.jpg" type="image/jpeg">
  <title>Activity Feed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    #stage {
      position: fixed;
      left: 12px;
      bottom: 12px;
      width: 380px;
      max-width: calc(100vw - 24px);
      min-height: 72px;
      pointer-events: none;
    }

    .activity-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(8, 8, 12, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      color: var(--activity-text, #fff);
      font-size: var(--activity-font, 16px);
      opacity: 0;
      transform: translateY(12px) scale(0.96);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .activity-card.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .activity-card.leaving {
      opacity: 0;
      transform: translateY(-8px) scale(0.98);
    }

    .activity-avatar-wrap {
      position: relative;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .activity-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid var(--activity-border, #ff0050);
      box-shadow: 0 0 10px color-mix(in srgb, var(--activity-border, #ff0050) 45%, transparent);
      box-sizing: border-box;
    }

    .activity-avatar--placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #333;
      font-size: 18px;
    }

    .activity-body {
      flex: 1;
      min-width: 0;
    }

    .activity-name {
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .activity-text {
      font-size: 0.92em;
      opacity: 0.92;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .activity-media {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
    }

    .activity-icon {
      font-size: 1.35em;
      line-height: 1;
    }

    .activity-gift {
      width: 34px;
      height: 34px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <script src="/js/activity-config.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/overlay-socket.js"></script>
  <script>
    const socket = createOverlaySocket();
    const config = readActivityConfigFromUrl();
    const stage = document.getElementById('stage');

    const MAX_QUEUE = 24;
    const DISPLAY_MS = 3600;
    const FADE_MS = 380;

    const queue = [];
    let showing = false;
    let currentCard = null;
    let hideTimer = null;
    let fadeTimer = null;

    function applyConfigToStage() {
      stage.style.setProperty('--activity-text', config.textColor);
      stage.style.setProperty('--activity-font', getActivityFontSizePx(config.fontSizeId) + 'px');
      stage.style.setProperty('--activity-border', config.borderColor);
    }

    function clearTimers() {
      if (hideTimer) {
        clearTimeout(hideTimer);
        hideTimer = null;
      }
      if (fadeTimer) {
        clearTimeout(fadeTimer);
        fadeTimer = null;
      }
    }

    function enqueueActivity(data) {
      if (!data || !data.type) return;
      if (queue.length >= MAX_QUEUE) queue.shift();
      queue.push(data);
      drainQueue();
    }

    function drainQueue() {
      if (showing || queue.length === 0) return;
      showing = true;
      clearTimers();

      const item = queue.shift();
      stage.replaceChildren();
      stage.insertAdjacentHTML('beforeend', buildActivityCardMarkup(item, config));
      currentCard = stage.querySelector('.activity-card');

      requestAnimationFrame(() => {
        if (currentCard) currentCard.classList.add('visible');
      });

      hideTimer = setTimeout(() => {
        if (!currentCard) {
          showing = false;
          drainQueue();
          return;
        }
        currentCard.classList.add('leaving');
        currentCard.classList.remove('visible');
        fadeTimer = setTimeout(() => {
          if (currentCard) currentCard.remove();
          currentCard = null;
          showing = false;
          drainQueue();
        }, FADE_MS);
      }, DISPLAY_MS);
    }

    applyConfigToStage();

    socket.on('activity', enqueueActivity);
  </script>
</body>
</html>
