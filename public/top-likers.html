<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/icon.jpg" type="image/jpeg">
  <title>Top Likers</title>
  <style>
    body {
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 12px;
      color: white;
      width: 380px; /* จำกัดความกว้าง */
    }
    .liker {
      display: flex;
      align-items: center;
      /* background: rgba(35, 35, 35, 0.92); */
      margin-bottom: 8px;
      padding: 9px 14px;
      border-radius: 12px;
      /* box-shadow: 0 3px 12px rgba(0,0,0,0.5); */
    }
    .rank-container {
      width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
    }
    .medal {
      font-size: 26px;
    }
    .crown {
      font-size: 20px;
      margin-left: 4px;
    }
    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid #ffd700;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .info {
      flex: 1;
      min-width: 0; /* สำคัญ: ให้ตัดชื่อยาว */
    }
    .nickname {
      font-size: 17px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis; /* ตัดชื่อยาวด้วย ... */
      margin-bottom: 2px;
    }
    .likes {
      font-size: 15px;
      color: #ff4d6d;
      display: flex;
      align-items: center;
      gap: 5px;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/overlay-socket.js"></script>
  <script>
    const socket = createOverlaySocket();
    const container = document.getElementById('container');

    function getMedal(rank) {
      if (rank === 1) return `<span class="medal">🥇</span>`;
      if (rank === 2) return `<span class="medal">🥈</span>`;
      if (rank === 3) return `<span class="medal">🥉</span>`;
      return `<span style="color:#ccc; font-size:17px;">${rank}.</span>`;
    }

    socket.on('topLikers', (likers) => {
      container.innerHTML = '';

      likers.forEach(liker => {
        const div = document.createElement('div');
        div.className = 'liker';

        const avatarHtml = liker.avatar 
          ? `<img src="${liker.avatar}" class="avatar" onerror="this.style.display='none'">` 
          : `<div class="avatar" style="background:#555; display:flex; align-items:center; justify-content:center; font-size:20px; color:#aaa;">👤</div>`;

        div.innerHTML = `
          <div class="rank-container">
            ${getMedal(liker.rank)}
          </div>
          ${avatarHtml}
          <div class="info">
            <div class="nickname">${liker.nickname || liker.username}</div>
            <div class="likes">
              ❤️ ${liker.likes.toLocaleString()}
            </div>
          </div>
        `;

        container.appendChild(div);
      });
    });
  </script>
</body>
</html>
