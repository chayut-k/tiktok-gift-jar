<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/icon.jpg" type="image/jpeg">
  <title>Top Likers</title>
  <style>
    html, body {
      overflow: hidden;
    }
    body {
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 8px 10px;
      color: white;
      width: 380px;
      box-sizing: border-box;
    }
    #container {
      overflow: hidden;
    }
    .liker {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      padding: 6px 12px;
      border-radius: 12px;
    }
    .liker:last-child {
      margin-bottom: 0;
    }
    body[data-bg="transparent"] .liker {
      background: transparent;
    }
    body[data-bg="dim"] .liker {
      background: rgba(0, 0, 0, 0.45);
    }
    .rank-container {
      width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .medal {
      font-size: 24px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .avatar-bordered {
      border: 2.5px solid #ffd700;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.35);
    }
    .avatar-plain {
      border: none;
      box-shadow: none;
    }
    .avatar-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #aaa;
      background: #555;
    }
    .info {
      flex: 1;
      min-width: 0;
    }
    .nickname {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 1px;
    }
    body[data-name-size="sm"] .nickname { font-size: 14px; }
    body[data-name-size="md"] .nickname { font-size: 16px; }
    body[data-name-size="lg"] .nickname { font-size: 18px; }
    body[data-name-color="white"] .nickname {
      color: #ffffff;
    }
    body[data-name-color="black"] .nickname {
      color: #111111;
      text-shadow: 0 0 2px rgba(255, 255, 255, 0.35);
    }
    body[data-name-color="rainbow"] .nickname {
      background: linear-gradient(
        90deg,
        #ff0000,
        #ff8800,
        #ffff00,
        #00ff00,
        #0088ff,
        #8800ff,
        #ff0000
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: rainbowShift 2.5s linear infinite;
    }
    @keyframes rainbowShift {
      to { background-position: 200% center; }
    }
    .likes {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 500;
    }
    body[data-likes-size="sm"] .likes { font-size: 14px; }
    body[data-likes-size="md"] .likes { font-size: 16px; }
    body[data-likes-size="lg"] .likes { font-size: 18px; }
    body[data-likes-color="white"] .likes {
      color: #ffffff;
    }
    body[data-likes-color="black"] .likes {
      color: #111111;
      text-shadow: 0 0 2px rgba(255, 255, 255, 0.35);
    }
    body[data-likes-color="red"] .likes {
      color: #ff2d55;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/overlay-socket.js?v=1.0.8"></script>
  <script>
    document.body.dataset.bg = getOverlayBgId();
    document.body.dataset.nameColor = getOverlayNameColorId();
    document.body.dataset.likesColor = getOverlayLikesColorId();
    document.body.dataset.nameSize = getOverlayNameSizeId();
    document.body.dataset.likesSize = getOverlayLikesSizeId();
    const socket = createOverlaySocket();
    const container = document.getElementById('container');

    function getMedal(rank) {
      if (rank === 1) return '<span class="medal">🥇</span>';
      if (rank === 2) return '<span class="medal">🥈</span>';
      if (rank === 3) return '<span class="medal">🥉</span>';
      return `<span style="color:#ccc;font-size:16px;">${Number(rank)}.</span>`;
    }

    function getAvatarHtml(liker) {
      const avatarClass = liker.rank <= 3 ? 'avatar avatar-bordered' : 'avatar avatar-plain';
      const safeAvatar = sanitizeImageUrl(liker.avatar);
      if (safeAvatar) {
        return `<img src="${safeAvatar}" class="${avatarClass}" onerror="this.style.display='none'">`;
      }
      return `<div class="${avatarClass} avatar-placeholder">👤</div>`;
    }

    socket.on('topLikers', (likers) => {
      container.innerHTML = '';

      likers.slice(0, 10).forEach((liker) => {
        const div = document.createElement('div');
        div.className = 'liker';
        div.innerHTML = `
          <div class="rank-container">${getMedal(liker.rank)}</div>
          ${getAvatarHtml(liker)}
          <div class="info">
            <div class="nickname">${escapeHtml(liker.nickname || liker.username)}</div>
            <div class="likes">❤️ ${liker.likes.toLocaleString()}</div>
          </div>
        `;
        container.appendChild(div);
      });
    });
  </script>
</body>
</html>
