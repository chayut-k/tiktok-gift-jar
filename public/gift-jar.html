<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Gift Jar - Fixed Stacking</title>
  <style>
    body { background: transparent; font-family: Arial, sans-serif; margin: 0; overflow: hidden; }
    .jar-container { width: 460px; height: 620px; margin: 20px auto; position: relative; }
    .jar { 
      width: 100%; height: 100%; 
      background: url('images/jar2.png') no-repeat center center;
      background-size: contain;
      position: relative; overflow: hidden;
      filter: drop-shadow(0 25px 35px rgba(0,0,0,0.6));
    }
    .gifts-container {
      position: absolute;
      bottom: 95px;
      left: 80px;
      width: 68%;
      height: 255px;
      overflow: visible;
      z-index: 3;
    }
    .gift-stack {
      position: absolute;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.2));
    }
    .gift-fall {
      position: absolute;
      animation: fallAndLand 3.2s forwards;
      z-index: 10;
    }
    @keyframes fallAndLand {
      0%   { transform: translateY(-450px) rotate(0deg); }
      45%  { transform: translateY(60px) rotate(28deg); }
      100% { transform: translateY(198px) rotate(52deg); }
    }
    .liquid {
      position: absolute; 
      bottom: 88px; 
      left: 85px; 
      width: 65%; 
      height: 8%; 
      background: linear-gradient(to top, #ffeb3b, #ffaa00, #ff7700);
      transition: height 1.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 50% 50% 45% 45%;
      box-shadow: inset 0 12px 25px rgba(0,0,0,0.5);
      z-index: 2;
      opacity: 0%;
    }
    .coin-counter {
      position: absolute;
      bottom: 45px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 8px 26px;
      border-radius: 30px;
      font-size: 26px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }
    .label { 
      text-align: center; 
      color: #ffd700; 
      font-size: 23px; 
      margin-top: 15px;
      text-shadow: 0 3px 12px #000; 
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="jar-container">
    <div class="jar" id="jar">
      <div class="gifts-container" id="gifts"></div>
      <div id="liquid" class="liquid"></div>
      <div class="coin-counter">
      <img src="images/coin.png" style="width: 50px;height: 50px; background-color: #000;"> <span id="total">0</span></div>
    </div>
  </div>
  
  <div class="label" id="last-gift">รอของขวัญ...</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let total = 0;
    const maxGoal = 50000;
    let giftCount = 0;
    const MAX_GIFTS = 42;   // จำนวนสูงสุดก่อนเริ่มกองใหม่

    const giftsContainer = document.getElementById('gifts');
    const lastGiftLabel = document.getElementById('last-gift');

    function addGiftToJar(giftPictureUrl, diamonds) {
      const gift = document.createElement('img');
      gift.className = 'gift-stack gift-fall';
      gift.src = giftPictureUrl || 'images/coin.png';
      gift.onerror = () => { gift.src = 'images/coin.png'; };
      
      let baseSize = 40;
      let scale = diamonds >= 1000 ? 2.55 : 
                 diamonds >= 500 ? 2.2 : 
                 diamonds >= 100 ? 1.85 : Math.min(2.1, 0.85 + (diamonds / 55));
      
      const size = Math.floor(baseSize * scale);
      gift.style.width = size + 'px';
      gift.style.height = size + 'px';

      gift.style.left = (15 + Math.random() * 55) + '%';
      gift.style.top = '-100px';
      gift.style.transform = `rotate(${Math.random() * 55 - 25}deg)`;

      giftsContainer.appendChild(gift);

      setTimeout(() => {
        gift.classList.remove('gift-fall');
        gift.style.transition = 'all 1.1s cubic-bezier(0.34, 1.56, 0.64, 1)';
        
        const stackLevel = Math.floor(giftCount / 3.5);
        let bottomPos = 22 + (stackLevel * 15) + Math.random() * 24 - 10;
        
        gift.style.bottom = Math.min(bottomPos, 230) + 'px';
        gift.style.top = 'auto';
        gift.style.zIndex = 100 + giftCount;

        giftCount++;

        // เมื่อถึงจำนวนสูงสุด → ล้างแล้วเริ่มกองใหม่จากล่าง
        if (giftCount >= MAX_GIFTS) {
          setTimeout(() => {
            //giftsContainer.innerHTML = '';
            giftCount = 0;
          }, 600);
        }
      }, 2650);
    }

    socket.on('gift', (data) => {
      if (!data.user) return;

      total = data.total || total;
      document.getElementById('liquid').style.height = Math.min((total / maxGoal) * 100, 100) + '%';
      document.getElementById('total').textContent = total.toLocaleString('th-TH');

      lastGiftLabel.textContent = `${data.user} ส่ง ${data.giftName}`;

      const count = Math.min(data.repeatCount || 1, 3);
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          addGiftToJar(data.giftPictureUrl, data.diamonds);
        }, i * 220);
      }
    });
  </script>
</body>
</html>
